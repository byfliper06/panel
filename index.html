<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Imperio Zaw</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0b14;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0b14 100%);
            overflow: hidden;
            color: white;
        }
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.3; animation: float 10s ease-in-out infinite; z-index: 0; }
        .orb1 { width: 500px; height: 500px; background: #ff006e; top: -150px; left: -150px; }
        .orb2 { width: 400px; height: 400px; background: #3a86ff; bottom: -100px; right: -100px; animation-delay: -5s; }
        @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(40px, -40px); } }

        .container {
            position: relative; z-index: 10;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; border-radius: 32px; width: 440px; text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        h1 { color: #ff2d75; font-size: 32px; text-transform: uppercase; letter-spacing: 3px; font-weight: 900; margin-bottom: 5px; }
        .subtitle { color: rgba(255, 255, 255, 0.4); font-size: 11px; margin-bottom: 35px; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .status-dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; }

        .channel-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; transition: 0.3s;
        }
        .channel-row:hover { background: rgba(255, 255, 255, 0.06); transform: translateX(5px); }
        .channel-info { display: flex; align-items: center; gap: 15px; }
        .channel-icon { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .gen-bg { background: linear-gradient(135deg, #ff006e, #ff4d6d); }
        .react-bg { background: linear-gradient(135deg, #8338ec, #c77dff); }
        .would-bg { background: linear-gradient(135deg, #3a86ff, #00b4d8); }
        
        input {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 12px; border-radius: 12px; outline: none; text-align: center;
        }
        .subs-input { width: 140px; font-size: 20px; font-family: 'Consolas', monospace; font-weight: 800; color: #00ff88; }
        .login-input { width: 100%; font-size: 18px; margin-bottom: 20px; letter-spacing: 5px; }

        button {
            width: 100%; background: #ff2d75; color: white; border: none;
            padding: 18px; border-radius: 18px; cursor: pointer; font-weight: 800;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        button:hover { background: #ff4d8d; transform: translateY(-3px); }

        #custom-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; border-radius: 12px; font-weight: 700; z-index: 1000;
            transition: 0.5s; display: flex; align-items: center; gap: 10px;
        }
        .toast-success { background: #00ff88; color: #0a0b14; }
        .toast-error { background: #ff2d75; color: white; }
        .footer { margin-top: 25px; font-size: 11px; color: rgba(255, 255, 255, 0.3); }
        #last-update { color: #3a86ff; font-weight: bold; }
    </style>
</head>
<body>

<div id="custom-toast"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div id="login-overlay" style="display: flex; position: fixed; inset: 0; z-index: 100; background: #0a0b14; justify-content: center; align-items: center;">
    <div class="container">
        <h1>ACCESO</h1>
        <div class="subtitle">SISTEMA PRIVADO ZAW</div>
        <input type="password" id="pass-field" class="login-input" placeholder="••••••">
        <button onclick="checkLogin()">ENTRAR</button>
    </div>
</div>

<div class="container" id="main-panel" style="display: none;">
    <h1>CONTADOR SUBS</h1>
    <div class="subtitle"><span class="status-dot"></span> IMPERIO ZAW - LIVE STATS</div>
    
    <div class="channels">
        <div class="channel-row">
            <div class="channel-info"><div class="channel-icon gen-bg">G</div><span class="channel-name">GENZAW</span></div>
            <input type="text" id="gen" class="subs-input" placeholder="0" oninput="formatNumber(this)">
        </div>
        <div class="channel-row">
            <div class="channel-info"><div class="channel-icon react-bg">Z</div><span class="channel-name">ZAWREACTS</span></div>
            <input type="text" id="react" class="subs-input" placeholder="0" oninput="formatNumber(this)">
        </div>
        <div class="channel-row">
            <div class="channel-info"><div class="channel-icon would-bg">W</div><span class="channel-name">WOULDZAW</span></div>
            <input type="text" id="would" class="subs-input" placeholder="0" oninput="formatNumber(this)">
        </div>
    </div>

    <button onclick="saveData()">ACTUALIZAR PANEL</button>
    <div class="footer">Ultima Actualización: <span id="last-update">Cargando...</span></div>
</div>

<script>
    // CONFIGURACIÓN DE TU FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDHhGmSUS1MpNEAZaI_G365uWLGEZ3zlr4",
        authDomain: "imperio-zaw.firebaseapp.com",
        databaseURL: "https://imperio-zaw-default-rtdb.firebaseio.com",
        projectId: "imperio-zaw",
        storageBucket: "imperio-zaw.firebasestorage.app",
        messagingSenderId: "281331374578",
        appId: "1:281331374578:web:2db167949f367d87c2f36b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showToast(msg, type) {
        const toast = document.getElementById('custom-toast');
        toast.innerText = msg;
        toast.className = type === 'success' ? 'toast-success' : 'toast-error';
        toast.style.top = '30px';
        setTimeout(() => { toast.style.top = '-100px'; }, 3000);
    }

    function checkLogin() {
        if(document.getElementById('pass-field').value === "Kevin") {
            showToast("Bienvenido Kevin", "success");
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-panel').style.display = 'block';
        } else {
            showToast("Acceso Denegado", "error");
        }
    }

    // CARGA EN TIEMPO REAL
    db.ref('stats').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            document.getElementById('gen').value = data.gen;
            document.getElementById('react').value = data.react;
            document.getElementById('would').value = data.would;
            document.getElementById('last-update').innerText = data.date;
        }
    });

    function saveData() {
        const now = new Date();
        const dateStr = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();
        db.ref('stats').set({
            gen: document.getElementById('gen').value,
            react: document.getElementById('react').value,
            would: document.getElementById('would').value,
            date: dateStr
        }).then(() => showToast("Sincronizado", "success"));
    }

    function formatNumber(input) {
        let val = input.value.replace(/\D/g, "");
        if (val === "") return;
        input.value = new Intl.NumberFormat('de-DE').format(val);
    }

    // --- NUEVO: FUNCIONALIDAD TECLA ENTER ---
    
    // Al pulsar Enter en el campo de contraseña
    document.getElementById('pass-field').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkLogin();
        }
    });

    // Al pulsar Enter en cualquiera de los inputs de suscriptores
    const inputs = ['gen', 'react', 'would'];
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                saveData();
            }
        });
    });

</script>
</body>
</html>
