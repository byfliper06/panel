<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Suscriptores</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #0a0b14; color: white; overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px;
            border-radius: 30px; width: 420px; text-align: center; position: relative; z-index: 10;
        }
        h1 { color: #ff2d75; font-size: 28px; letter-spacing: 2px; margin-bottom: 10px; }
        .subtitle { color: rgba(255, 255, 255, 0.4); font-size: 10px; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; }
        
        .row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.02); padding: 15px;
            margin-bottom: 12px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .info { display: flex; align-items: center; gap: 12px; color: white; font-weight: bold; font-size: 14px; }
        .icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; }
        
        input {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 10px; border-radius: 12px; text-align: center; outline: none;
        }
        .subs-input { width: 130px; font-size: 18px; color: #00ff88; font-weight: 800; }
        .login-input { width: 100%; font-size: 20px; margin-bottom: 20px; letter-spacing: 4px; }

        button {
            width: 100%; background: #ff2d75; color: white; border: none;
            padding: 16px; border-radius: 15px; cursor: pointer; font-weight: 800;
            transition: 0.3s; margin-top: 10px;
        }
        button:hover { background: #ff4d8d; transform: scale(1.02); }

        #toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; border-radius: 15px; font-weight: bold; z-index: 1000; transition: 0.5s;
        }
        .success { background: #00ff88; color: #0a0b14; }
        .error { background: #ff2d75; color: white; }
        .footer { margin-top: 20px; font-size: 10px; color: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="login-screen" style="position: fixed; inset: 0; background: #0a0b14; z-index: 100; display: flex; justify-content: center; align-items: center;">
    <div class="container">
        <h1>ACCESO</h1>
        <input type="password" id="pass" class="login-input" placeholder="••••••" autofocus>
        <button onclick="login()">ENTRAR</button>
    </div>
</div>

<div class="container" id="main" style="display:none;">
    <h1>CONTADOR SUBS</h1>
    <div class="subtitle"><div class="dot"></div>LIVE STATS</div>
    <div class="row">
        <div class="info"><div class="icon" style="background: linear-gradient(135deg, #ff006e, #ff4d6d);">G</div>GENZAW</div>
        <input type="text" id="gen" class="subs-input" placeholder="0" oninput="fmt(this)">
    </div>
    <div class="row">
        <div class="info"><div class="icon" style="background: linear-gradient(135deg, #8338ec, #c77dff);">Z</div>ZAWREACTS</div>
        <input type="text" id="react" class="subs-input" placeholder="0" oninput="fmt(this)">
    </div>
    <div class="row">
        <div class="info"><div class="icon" style="background: linear-gradient(135deg, #3a86ff, #00b4d8);">W</div>WOULDZAW</div>
        <input type="text" id="would" class="subs-input" placeholder="0" oninput="fmt(this)">
    </div>
    <button onclick="save()">ACTUALIZAR PANEL</button>
    <div class="footer">Ultima Actualización: <span id="time" style="color:#3a86ff">...</span></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDHhGmSUS1MpNEAZaI_G365uWLGEZ3zlr4",
        authDomain: "imperio-zaw.firebaseapp.com",
        databaseURL: "https://imperio-zaw-default-rtdb.firebaseio.com",
        projectId: "imperio-zaw",
        storageBucket: "imperio-zaw.firebasestorage.app",
        messagingSenderId: "281331374578",
        appId: "1:281331374578:web:2db167949f367d87c2f36b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function msg(t, c) {
        const s = document.getElementById('toast');
        s.innerText = t; s.className = c; s.style.top = '30px';
        setTimeout(() => s.style.top = '-100px', 3000);
    }

    function login() {
        if(document.getElementById('pass').value === "kevin") {
            msg("Bienvenido Kevin", "success");
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            document.getElementById('gen').focus();
        } else { msg("Error", "error"); }
    }

    db.ref('stats').on('value', (s) => {
        const d = s.val();
        if(d) {
            document.getElementById('gen').value = d.gen;
            document.getElementById('react').value = d.react;
            document.getElementById('would').value = d.would;
            document.getElementById('time').innerText = d.date;
        }
    });

    function save() {
        const d = new Date().toLocaleString();
        db.ref('stats').set({
            gen: document.getElementById('gen').value,
            react: document.getElementById('react').value,
            would: document.getElementById('would').value,
            date: d
        }).then(() => msg("Sincronizado", "success"));
    }

    function fmt(i) {
        let v = i.value.replace(/\D/g, "");
        if (v) i.value = new Intl.NumberFormat('de-DE').format(v);
    }

    // ENTER KEYS
    document.getElementById('pass').addEventListener('keypress', e => e.key === 'Enter' && login());
    ['gen', 'react', 'would'].forEach(id => {
        document.getElementById(id).addEventListener('keypress', e => e.key === 'Enter' && save());
    });
</script>
</body>
</html>
